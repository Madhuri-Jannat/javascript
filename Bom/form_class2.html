<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body> 
    <fieldset>
        <legend>Student Form</legend>
    <form action="#" name="f">
        ID: <br>
        <input type="text" name="i"> <br>
        
        Name: <br>
        <input type="text" name="n" id="">
        <br>
        last Name: <br>
        <input type="text" name="l" id="">
        <br>
        Full Name: <br>
        <input type="text" name="u" id=""> <br>
        Email: <br>
        <input type="email" name="e" id=""> <br>
        Address: <br>
        <textarea name="ad" id=""></textarea> <br>
        Course: <br>
        <select name="r" id="">
            <option value="MBA">MBA</option>
            <option value="BBA">BBA</option>
            <option value="MSC">MSC</option>
            <option value="DIPLOMA">DIPLOMA</option>
        </select>
        <br> <br>
        Subject: <br>
        <input type="checkbox" name="c" value="English">English
        <input type="checkbox" name="c" value="Bangla">Bangla
        <input type="checkbox" name="c" value="Math">Math <br>


        Gender: <br>
        <input type="radio" name="d" value="Female">Female
        <input type="radio" name="d" value="Male">Male
        <input type="radio" name="d" value="Others">Others
          <br>
        <input type="submit" value="Sunbmit" onclick="info()" style="background-color: rgb(99, 132, 99);">
        <input type="reset" name="" id="" style="background-color: rgb(204, 163, 133);">



        
    </form>
    
    </fieldset>
    
    <script>
        function info() {

    let id = document.f.i.value;
    let nam = document.f.n.value;
    let lastname = document.f.l.value;
    let fullname = document.f.u.value;
    let email = document.f.e.value;
    let address = document.f.ad.value;
    let Course = document.f.r.value;
    let Subject = "";
    let Gender= "";
    let store = window.open("", "", "width=400,height=400");

    for(let j = 0; j < document.f.c.length; j++) {
        if(document.f.c[j].checked){
            Subject+= document.f.c[j].value + ", ";
        }
    }


    for( let i=0;i<document.f.d.length; i++){
        if(document.f.d[i].checked) {
            Gender= document.f.d[i].value;
        }
    }

    store.document.write("Student ID: " + id + "<br>");
    store.document.write("Student Name: " + nam + "<br>");
    store.document.write("Last Name: " + lastname + "<br>");
    store.document.write("Full Name: " + fullname + "<br>");
    store.document.write("Email: " + email + "<br>");
    store.document.write("Student Address: " + address + "<br>");
    store.document.write("Course: " + Course + "<br>");
    store.document.write("Subject: " + Subject  + "<br>");
    store.document.write("Gender: " + Gender + "<br>");
    store.document.write('<input type="button" onclick = self.close(); value="close me"/>')
    store.document.write('<input type="button" onclick = self.close(); value="Print"/>')
}
    </script>
</body>
</html>
