<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" name="f">
        Name: <br>
        <input type="text" name="n" id="">
        <br>
        Address: <br>
        <textarea name="ad" id=""></textarea> <br>
        <input type="submit" value="Sunbmit" onclick="info()">
        <input type="reset" name="" id="">



        
    </form>

    <script>
        function info() {
            nam = document.f.n.value;
            address = document.f.ad.value;
            store = window.open("","","width=400px,height=400px");
            store.document.write("Student Name: " + nam + "<br>");
            store.document.write("Student Address : " + address );
        }
    </script>
</body>
</html>
