<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Number</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("Enter your First Number"));
        let b = parseInt(prompt("Enter your Second Number"));
        let c = parseInt(prompt("Enter your Third Number"));

        if(a>b && a>c){
            largestNumber =a;
        } else if(b>a && b>c){
            largestNumber = b;
        } else {
            largestNumber  = c;
        }
        document.write("largest Number is:" + largestNumber)
    </script>
</body>
</html>
