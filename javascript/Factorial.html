<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Enter your value"));
        function myfactorial(num){
            if(num<0)
            return "Not possible";
        let result = 1 ;
        for(i=2; i<=num ; i++){
            result= result*i;
        }
        return result;
        }
        document.write(myfactorial(num));
    </script>
</body>
</html>
