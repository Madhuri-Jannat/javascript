<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var data = [4,4,-4,-1,0,-8,0,45,9,79];
        let positive=0;
        let negative=0;
        let zero=0;
        let sum =0;

        for(let i =0; i<data.length;i++){
            if(data[i]>0){
                positive++;
            }
            else if(data[i]<0){
                negative++;
            }
            else {
                zero++;
            }
            sum += data[i];
        }
        document.write("positive number:" +positive + "<br>");
            document.write("negative number:" + negative + "<br>");
            document.write(" zero number:" + zero + "<br>");
            document.write("  sum :" + sum + "<br>");
    </script>
</body>
</html>
